<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despesas Mensais</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
  }
  .login-box {
    background: #111;
    padding: 40px 30px;
    border-radius: 16px;
    border: 1px solid #333;
    text-align: center;
    width: 100%;
    max-width: 380px;
  }
  h1 {
    font-size: 2.2rem;
    margin-bottom: 8px;
  }
  p {
    color: #888;
    margin-bottom: 30px;
  }
  input {
    width: 100%;
    padding: 16px;
    font-size: 1.3rem;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 10px;
    color: white;
    margin-bottom: 20px;
    text-align: center;
  }
  button {
    width: 100%;
    padding: 16px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
  }
  button:hover { background: #ddd; }
  #error { color: #ff6666; margin-top: 12px; }
</style>
</head>
<body>

<div class="login-box">
  <h1>Despesas Mensais</h1>
  <p>Introduz o PIN para continuar</p>
  
  <input type="password" id="pinInput" placeholder="PIN de 4 dígitos" maxlength="4" autofocus>
  
  <button onclick="verifyPIN()">Entrar</button>
  <div id="error"></div>
</div>

<script>
function verifyPIN() {
  const pin = document.getElementById('pinInput').value.trim();
  
  if (pin === '1007') {
    alert('✅ Login efetuado com sucesso!');
    // Aqui vai aparecer a aplicação completa (vou adicionar na próxima mensagem)
    document.body.innerHTML = `<h1 style="color:white;text-align:center;margin-top:100px;">Bem-vindo! 🎉<br><br>Aplicação em construção...</h1>`;
  } else {
    document.getElementById('error').textContent = 'PIN incorreto. Tenta 1007';
  }
}

// Permite pressionar Enter
document.getElementById('pinInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') verifyPIN();
});
</script>
</body>
</html>
