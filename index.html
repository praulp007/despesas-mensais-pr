<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despesas Mensais</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #000000;
    --surface: #111111;
    --surface2: #1c1c1c;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888888;
    --accent: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }
  /* ... (mantive o resto do CSS igual) ... */
  /* LOGIN */
  #loginScreen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.98);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .login-box {
    background: var(--surface);
    padding: 40px 30px;
    border-radius: 16px;
    border: 1px solid var(--border);
    text-align: center;
    max-width: 340px;
    width: 100%;
  }
  .pin-inputs {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin: 24px 0;
  }
  .pin-inputs input {
    width: 55px;
    height: 65px;
    text-align: center;
    font-size: 2rem;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: white;
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Despesas Mensais</h1>
    <p style="color:#aaa; margin:16px 0 24px;">Introduz o PIN para continuar</p>
    <div class="pin-inputs" id="pinInputs">
      <input type="text" maxlength="1" class="pin-digit" inputmode="numeric" autofocus>
      <input type="text" maxlength="1" class="pin-digit" inputmode="numeric">
      <input type="text" maxlength="1" class="pin-digit" inputmode="numeric">
      <input type="text" maxlength="1" class="pin-digit" inputmode="numeric">
    </div>
    <div id="loginError" style="color:#ff6666; margin:12px 0; min-height:24px;"></div>
    <button onclick="verifyPIN()" style="background:#fff;color:#000;padding:14px 40px;border:none;border-radius:8px;font-weight:700;font-size:1.1rem;cursor:pointer;">Entrar</button>
  </div>
</div>

<div id="mainApp" style="display:none;max-width:1200px;margin:0 auto;">
  <h1>Despesas Mensais</h1>
  <p class="subtitle">Regista, organiza e analisa os teus gastos</p>
  <!-- resto do conteúdo original -->
</div>

<script>
// === CONFIG SUPABASE ===
const SUPABASE_URL = 'https://ohbbcsghkyhzfavvzkyz.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_KGEYS3WfYgdotlgwl5uhbw_UhU-d5Bf';

let supabase;
let currentUser = { id: 'user_1007' };

async function initSupabase() {
  supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

function verifyPIN() {
  const digits = Array.from(document.querySelectorAll('.pin-digit')).map(i => i.value).join('');
  if (digits === '1007') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadExpenses();
  } else {
    document.getElementById('loginError').textContent = 'PIN incorreto. Tenta 1007';
  }
}

// PIN navigation
document.addEventListener('DOMContentLoaded', () => {
  const inputs = document.querySelectorAll('.pin-digit');
  inputs.forEach((input, idx) => {
    input.addEventListener('input', () => {
      if (input.value.length === 1 && idx < 3) inputs[idx+1].focus();
    });
  });
});

}

initSupabase();
</script>
</body>
</html>
