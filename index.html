<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despesas Mensais</title>
<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    background: #111;
    padding: 50px 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    border: 1px solid #333;
  }
  h1 { font-size: 2.4rem; margin-bottom: 10px; }
  p { color: #aaa; margin-bottom: 30px; }
  input {
    width: 100%;
    padding: 18px;
    font-size: 1.5rem;
    text-align: center;
    background: #1a1a1a;
    border: 2px solid #555;
    border-radius: 12px;
    color: white;
    margin-bottom: 25px;
  }
  button {
    width: 100%;
    padding: 18px;
    background: white;
    color: black;
    border: none;
    border-radius: 12px;
    font-size: 1.2rem;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="box">
  <h1>Despesas Mensais</h1>
  <p>Introduz o PIN para continuar</p>
  <input type="password" id="pin" placeholder="PIN" maxlength="4" autofocus>
  <button onclick="entrar()">Entrar</button>
</div>

<script>
function entrar() {
  if (document.getElementById('pin').value === '1007') {
    alert('✅ Login feito com sucesso!');
    document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:200px;">Bem-vindo à aplicação!</h1>';
  } else {
    alert('PIN errado. Usa 1007');
  }
}
document.getElementById('pin').addEventListener('keypress', e => {
  if (e.key === 'Enter') entrar();
});
</script>
</body>
</html>
