<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despesas Mensais</title>
<style>
  :root {
    --bg: #000000;
    --surface: #111111;
    --surface2: #1c1c1c;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888888;
    --accent: #ffffff;
    --accent-dim: #cccccc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.7rem;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }

  .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 24px; }

  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .card-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  /* NAV */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    width: 34px; height: 34px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.15s;
  }

  .nav button:hover { background: #2e2e2e; }

  .month-label {
    font-size: 1rem;
    font-weight: 700;
    color: #ffffff;
  }

  /* CALENDAR */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .day-header {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--muted);
    padding: 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
    position: relative;
    min-height: 46px;
    font-size: 0.85rem;
  }

  .day:hover { background: var(--surface2); border-color: var(--border); }
  .day.empty { cursor: default; }
  .day.empty:hover { background: none; border-color: transparent; }

  .day.today {
    border-color: #555555;
  }

  .day.selected {
    background: #ffffff;
    border-color: #ffffff;
    color: #000000;
  }

  .day-num { font-weight: 600; line-height: 1; }

  .day-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    margin-top: 3px;
    background: #888888;
  }

  .day.selected .day-dot { background: #555555; }

  .day-total {
    font-size: 0.55rem;
    color: #888888;
    margin-top: 2px;
    line-height: 1;
  }

  .day.selected .day-total { color: #555555; }

  /* FORM */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-full { margin-bottom: 10px; }

  label {
    display: block;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 0.875rem;
    font-family: Arial, Helvetica, sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus { border-color: #666666; }
  input::placeholder { color: #444444; }
  select option { background: var(--surface); }

  .btn-add {
    width: 100%;
    background: #ffffff;
    border: none;
    border-radius: 8px;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.875rem;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
    letter-spacing: 0.01em;
  }

  .btn-add:hover { background: #e0e0e0; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  .selected-date-label {
    font-size: 0.85rem;
    color: #aaaaaa;
    font-weight: 600;
    margin-bottom: 14px;
  }

  /* EXPENSES LIST */
  .expense-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
  }

  .cat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .expense-info { flex: 1; min-width: 0; }

  .expense-desc {
    font-size: 0.875rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #f0f0f0;
  }

  .expense-cat {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .expense-amount {
    font-weight: 700;
    font-size: 0.9rem;
    color: #ffffff;
    flex-shrink: 0;
  }

  .btn-del {
    background: none;
    border: none;
    color: #555555;
    cursor: pointer;
    font-size: 0.8rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .btn-del:hover { color: #cc4444; }

  .empty-list {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 20px 0;
  }

  /* PIE CHART */
  .chart-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  canvas { max-width: 200px; margin: 0 auto; }

  .legend {
    width: 100%;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .legend-color {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .legend-name { flex: 1; font-size: 0.8rem; font-weight: 500; color: #cccccc; }

  .legend-pct {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .legend-val {
    font-size: 0.8rem;
    font-weight: 700;
    color: #ffffff;
  }

  .month-total {
    text-align: center;
    margin-bottom: 16px;
  }

  .month-total-val {
    font-size: 2rem;
    font-weight: 700;
    color: #ffffff;
  }

  .month-total-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .no-data {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 30px 0;
  }

  .right-col { display: flex; flex-direction: column; gap: 20px; }
</style>
</head>
<body>

<div style="max-width:1200px;margin:0 auto 24px;">
  <h1>Despesas Mensais</h1>
  <p class="subtitle">Regista, organiza e analisa os teus gastos</p>
</div>

<div class="layout">
  <div style="display:flex;flex-direction:column;gap:20px;">

    <div class="card">
      <div class="nav">
        <button id="prevMonth">&#8592;</button>
        <span class="month-label" id="monthLabel"></span>
        <button id="nextMonth">&#8594;</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="card">
      <div class="card-title">Nova Despesa</div>
      <p class="selected-date-label" id="selectedDateLabel">Seleciona um dia no calendário</p>

      <div class="form-row">
        <div>
          <label>Valor (€)</label>
          <input type="number" id="inputAmount" placeholder="0.00" min="0" step="0.01">
        </div>
        <div>
          <label>Categoria</label>
          <select id="inputCategory">
            <option value="alimentacao">🍔 Alimentação</option>
            <option value="transporte">🚗 Transporte</option>
            <option value="lazer">🎮 Lazer</option>
            <option value="saude">💊 Saúde</option>
            <option value="casa">🏠 Casa</option>
            <option value="vestuario">👕 Vestuário</option>
            <option value="educacao">📚 Educação</option>
            <option value="outro">📌 Outro</option>
          </select>
        </div>
      </div>
      <div class="form-full">
        <label>Descrição</label>
        <input type="text" id="inputDesc" placeholder="Ex: Supermercado, Netflix, Gasolina...">
      </div>
      <button class="btn-add" id="btnAdd">+ Adicionar Despesa</button>
    </div>

    <div class="card" id="dayListCard" style="display:none;">
      <div class="card-title" id="dayListTitle">Despesas do dia</div>
      <div id="dayList"></div>
    </div>

  </div>

  <div class="right-col">
    <div class="card">
      <div class="card-title">Resumo do Mês</div>
      <div class="month-total">
        <div class="month-total-val" id="monthTotalVal">€0,00</div>
        <div class="month-total-label">total gasto este mês</div>
      </div>
      <div class="chart-wrap">
        <canvas id="pieCanvas" width="200" height="200"></canvas>
        <div class="legend" id="legend"></div>
      </div>
      <div class="no-data" id="noData">Sem despesas este mês</div>
    </div>
  </div>
</div>

<script>
const CATEGORIES = {
  alimentacao: { label: '🍔 Alimentação', color: '#e5e5e5' },
  transporte:  { label: '🚗 Transporte',  color: '#a0a0a0' },
  lazer:       { label: '🎮 Lazer',        color: '#ffffff' },
  saude:       { label: '💊 Saúde',        color: '#c8c8c8' },
  casa:        { label: '🏠 Casa',         color: '#707070' },
  vestuario:   { label: '👕 Vestuário',    color: '#505050' },
  educacao:    { label: '📚 Educação',     color: '#888888' },
  outro:       { label: '📌 Outro',        color: '#383838' },
};

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

let data = JSON.parse(localStorage.getItem('despesas_v1') || '{}');
let currentDate = new Date();
let selectedDate = null;

function save() { localStorage.setItem('despesas_v1', JSON.stringify(data)); }

function keyFor(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmt(n) {
  return '€' + n.toFixed(2).replace('.', ',');
}

function getMonthExpenses(year, month) {
  const result = {};
  Object.keys(data).forEach(k => {
    const [y, m] = k.split('-').map(Number);
    if (y === year && m === month + 1) result[k] = data[k];
  });
  return result;
}

function renderCalendar() {
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  document.getElementById('monthLabel').textContent = `${MONTHS_PT[m]} ${y}`;

  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  DAYS_PT.forEach(d => {
    const h = document.createElement('div');
    h.className = 'day-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  const first = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < first; i++) {
    const el = document.createElement('div');
    el.className = 'day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'day';
    const dateObj = new Date(y, m, d);
    const key = keyFor(dateObj);

    if (today.getFullYear() === y && today.getMonth() === m && today.getDate() === d)
      el.classList.add('today');

    if (selectedDate && keyFor(selectedDate) === key)
      el.classList.add('selected');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    el.appendChild(numEl);

    if (data[key] && data[key].length > 0) {
      const dot = document.createElement('div');
      dot.className = 'day-dot';
      el.appendChild(dot);

      const total = data[key].reduce((s, e) => s + e.amount, 0);
      const totalEl = document.createElement('div');
      totalEl.className = 'day-total';
      totalEl.textContent = fmt(total);
      el.appendChild(totalEl);
    }

    el.addEventListener('click', () => {
      selectedDate = new Date(y, m, d);
      renderCalendar();
      renderDayList();
      document.getElementById('selectedDateLabel').textContent =
        `${d} de ${MONTHS_PT[m]} de ${y}`;
    });

    grid.appendChild(el);
  }
}

function renderDayList() {
  const card = document.getElementById('dayListCard');
  const list = document.getElementById('dayList');
  const title = document.getElementById('dayListTitle');

  if (!selectedDate) { card.style.display = 'none'; return; }

  const key = keyFor(selectedDate);
  const expenses = data[key] || [];
  const d = selectedDate.getDate();
  const m = selectedDate.getMonth();
  title.textContent = `${d} de ${MONTHS_PT[m]}`;
  card.style.display = 'block';

  if (expenses.length === 0) {
    list.innerHTML = '<div class="empty-list">Sem despesas neste dia</div>';
    return;
  }

  list.innerHTML = '';
  expenses.forEach((e, i) => {
    const cat = CATEGORIES[e.category] || CATEGORIES.outro;
    const item = document.createElement('div');
    item.className = 'expense-item';
    item.innerHTML = `
      <div class="cat-dot" style="background:${cat.color}"></div>
      <div class="expense-info">
        <div class="expense-desc">${e.desc || cat.label.replace(/^\S+\s/, '')}</div>
        <div class="expense-cat">${cat.label}</div>
      </div>
      <div class="expense-amount">${fmt(e.amount)}</div>
      <button class="btn-del" data-key="${key}" data-idx="${i}" title="Remover">✕</button>
    `;
    list.appendChild(item);
  });

  list.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.key;
      const idx = parseInt(btn.dataset.idx);
      data[k].splice(idx, 1);
      if (data[k].length === 0) delete data[k];
      save();
      renderCalendar();
      renderDayList();
      renderChart();
    });
  });
}

function renderChart() {
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  const monthData = getMonthExpenses(y, m);

  const totals = {};
  let grandTotal = 0;

  Object.values(monthData).flat().forEach(e => {
    totals[e.category] = (totals[e.category] || 0) + e.amount;
    grandTotal += e.amount;
  });

  document.getElementById('monthTotalVal').textContent = fmt(grandTotal);

  const canvas = document.getElementById('pieCanvas');
  const noData = document.getElementById('noData');
  const legend = document.getElementById('legend');

  if (grandTotal === 0) {
    canvas.style.display = 'none';
    noData.style.display = 'block';
    legend.innerHTML = '';
    return;
  }

  canvas.style.display = 'block';
  noData.style.display = 'none';

  const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);

  const ctx = canvas.getContext('2d');
  const cx = 100, cy = 100, r = 85;
  ctx.clearRect(0, 0, 200, 200);

  let angle = -Math.PI / 2;
  sorted.forEach(([cat, val]) => {
    const slice = (val / grandTotal) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = CATEGORIES[cat]?.color || '#555555';
    ctx.fill();
    // thin gap
    ctx.strokeStyle = '#111111';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    angle += slice;
  });

  // Center hole
  ctx.beginPath();
  ctx.arc(cx, cy, 50, 0, 2 * Math.PI);
  ctx.fillStyle = '#111111';
  ctx.fill();

  legend.innerHTML = '';
  sorted.forEach(([cat, val]) => {
    const info = CATEGORIES[cat] || CATEGORIES.outro;
    const pct = ((val / grandTotal) * 100).toFixed(1);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-color" style="background:${info.color}"></div>
      <div class="legend-name">${info.label}</div>
      <div class="legend-pct">${pct}%</div>
      <div class="legend-val">${fmt(val)}</div>
    `;
    legend.appendChild(item);
  });
}

document.getElementById('prevMonth').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  selectedDate = null;
  document.getElementById('selectedDateLabel').textContent = 'Seleciona um dia no calendário';
  renderCalendar(); renderDayList(); renderChart();
});

document.getElementById('nextMonth').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  selectedDate = null;
  document.getElementById('selectedDateLabel').textContent = 'Seleciona um dia no calendário';
  renderCalendar(); renderDayList(); renderChart();
});

document.getElementById('btnAdd').addEventListener('click', () => {
  if (!selectedDate) { alert('Seleciona primeiro um dia no calendário.'); return; }
  const amount = parseFloat(document.getElementById('inputAmount').value);
  if (!amount || amount <= 0) { alert('Insere um valor válido.'); return; }
  const category = document.getElementById('inputCategory').value;
  const desc = document.getElementById('inputDesc').value.trim();

  const key = keyFor(selectedDate);
  if (!data[key]) data[key] = [];
  data[key].push({ amount, category, desc });
  save();

  document.getElementById('inputAmount').value = '';
  document.getElementById('inputDesc').value = '';

  renderCalendar(); renderDayList(); renderChart();
});

renderCalendar();
renderChart();
</script>
</body>
</html>
